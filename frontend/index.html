<!DOCTYPE html>
<html>
<head>
  <title>Step 1 - Real API</title>

  <style>

    body {
      font-family: Arial;
      padding: 20px;
    }

    button {
      padding: 10px 16px;
      cursor: pointer;
    }

    table {
      width: 500px;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }

    th {
      background: #f4f4f4;
    }

  </style>

</head>

<body>

  <h1>Document Types</h1>

  <button id="loadBtn">
    Load Document Types
  </button>

  <table>

    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
      </tr>
    </thead>

    <tbody id="tableBody">

      <tr>
        <td colspan="2">
          Click Load
        </td>
      </tr>

    </tbody>

  </table>
  <script src="ui/document-types.view.js"></script>
  <script src="app.js"></script>

</body>
</html>
